<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2185b"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="764" cy="-34" r="36" fill="#e91e63" opacity="0.17"/>
    <circle cx="810" cy="290" r="68" fill="#e91e63" opacity="0.17"/>
    <circle cx="1281" cy="64" r="55" fill="#e91e63" opacity="0.13"/>
    <circle cx="739" cy="356" r="73" fill="#e91e63" opacity="0.19"/>
    <circle cx="296" cy="25" r="60" fill="#e91e63" opacity="0.13"/>
    <circle cx="973" cy="487" r="26" fill="#e91e63" opacity="0.17"/>
    <rect x="647" y="5" width="29" height="71" rx="8" fill="#c2185b" opacity="0.07" transform="rotate(18, 1211, -20)"/>
    <rect x="282" y="200" width="68" height="54" rx="8" fill="#c2185b" opacity="0.04" transform="rotate(37, 1256, 711)"/>
    <rect x="316" y="168" width="26" height="65" rx="8" fill="#c2185b" opacity="0.12" transform="rotate(38, 1288, -27)"/>
    <rect x="-89" y="209" width="37" height="41" rx="8" fill="#c2185b" opacity="0.06" transform="rotate(19, 1081, 183)"/>
    <rect x="766" y="157" width="22" height="95" rx="8" fill="#c2185b" opacity="0.07" transform="rotate(23, 972, 7)"/>
    <rect x="1170" y="429" width="52" height="29" rx="8" fill="#c2185b" opacity="0.04" transform="rotate(19, 1049, 705)"/>
    <rect x="263" y="231" width="47" height="77" rx="8" fill="#c2185b" opacity="0.11" transform="rotate(7, 397, 638)"/>
    <rect x="687" y="705" width="65" height="59" rx="8" fill="#c2185b" opacity="0.06" transform="rotate(35, 934, 133)"/>
    <polygon points="-35,652 12,746 -82,746" fill="#e91e63" opacity="0.06"/>
    <polygon points="879,152 905,204 853,204" fill="#e91e63" opacity="0.05"/>
    <polygon points="996,-89 1078,75 914,75" fill="#e91e63" opacity="0.11"/>
    <polygon points="384,208 419,278 349,278" fill="#e91e63" opacity="0.12"/>

  <!-- Wave at bottom -->
  <path d="M0,532 C360,581 840,483 1200,532 L1200,630 L0,630Z" fill="#e91e63" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    망원 노래방 추천정보
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    망원 — 노래방
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fff3e0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fff3e0" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    망원 망원 노래방 추천정보 — 노래방
  </text>
</svg>